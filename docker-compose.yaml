version: '3.8'
services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage

  neo4j:
    image: neo4j:latest
    ports:
      - "7474:7474" # HTTP 控制台
      - "7687:7687" # Bolt 协议
    environment:
      - NEO4J_AUTH=neo4j/password123 # 用户名/密码
    volumes:
      - ./data/neo4j_data:/data