# 1. LLM 模型配置
llm:
  base_url: "http://127.0.0.1:11434/v1"
  api_key: "ollama"
  temperature: 0.7
  stream: true
  # 角色分配
  main_model: "deepseek-r1:8b"     # 负责复杂推理和决策
  memory_model: "qwen2.5:1.5b"    # 负责事实提取和总结（速度快）

# 2. Embedding 向量化配置
embedding:
  provider: "local"
  model_name: "D:/ReHelloAgent/model/bge-base-zh-v1.5"
  vector_size:  768 # 注意：bge-small-zh-v1.5 的维度通常是 512

# 3. 数据库基础设施配置 (由 MemoryFactory 统一读取)
db:
  # 图数据库：用于 Semantic Memory 的结构化事实
  neo4j:
    uri: "bolt://localhost:7687"
    user: "neo4j"
    password: "your_password"

  # 向量数据库：用于 Episodic Memory 和 Semantic 的语义辅助
  qdrant:
    url: "http://127.0.0.1:6333"
    api_key: "qdrant"                 # 本地默认无 key
    collection_name: "hello_agent_memories"

# 4. 记忆层业务参数配置
agent:
  memory:
    working_capacity: 10          # 工作记忆（对话轮数）上限
    enable_auto_summarize: true   # 是否开启自动总结
    semantic_max_retries: 3       # LLM 提取事实时的重试次数